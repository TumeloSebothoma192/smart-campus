services:
  - type: web
    name: smart-campus-api
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /CampusServiceManagementSystemBackend/web/api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-campus-postgres
          property: connectionString

databases:
  - name: smart-campus-postgres
    plan: starter
