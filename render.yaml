services:
  - type: web
    name: smart-campus-api
    runtime: docker
    repo: https://github.com/TumeloSebothoma192/smart-campus
    branch: backend
    plan: starter
    autoDeployTrigger: commit
    healthCheckPath: /CampusServiceManagementSystemBackend/web/api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-campus-postgres
          property: connectionString

databases:
  - name: smart-campus-postgres
    plan: basic-256mb
